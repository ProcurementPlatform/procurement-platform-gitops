{{- if .Values.httproute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    app: {{ .Chart.Name }}
spec:
  # Attach to the single shared Gateway rendered by the umbrella chart.
  parentRefs:
    - name: procurement-{{ .Values.global.environment }}
      namespace: {{ .Release.Namespace }}
  {{- if .Values.global.domain }}
  hostnames:
    - {{ .Values.global.domain | quote }}
  {{- end }}
  rules:
    - matches:
        {{- range .Values.httproute.pathPrefixes }}
        - path:
            type: PathPrefix
            value: {{ . | quote }}
        {{- end }}
      backendRefs:
        - name: {{ include "chart.fullname" . }}
          port: {{ .Values.service.port }}
      # Gateway/Envoy defaults to a 15s route timeout if unset — too short
      # for Bedrock chat/analysis calls, which can take 10-20s+ under load.
      # That mismatch is what caused intermittent "assistant unavailable"
      # responses even though ai-service itself never errored.
      timeouts:
        request: 60s
{{- end }}
