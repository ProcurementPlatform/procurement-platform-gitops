document-service:
  replicaCount: 1
  image:
    repository: ""
    pullPolicy: IfNotPresent
    tag: "latest"
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
  service:
    type: ClusterIP
    port: 5004
    targetPort: 5004
  healthCheck:
    path: /api/health
  httproute:
    enabled: true
    pathPrefixes:
      - /api/documents
      - /api/notifications
      - /api/audit
      # Gateway PathPrefix matching is segment-based — "/api/audit" does not
      # match "/api/audit-logs" (no "/" boundary). The frontend calls
      # /api/audit-logs (which 301-redirects to /api/audit server-side), so
      # both prefixes must be registered for that redirect to be reachable.
      - /api/audit-logs
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  extraEnv: {}

