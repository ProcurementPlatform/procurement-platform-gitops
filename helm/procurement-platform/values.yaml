frontend:
  replicaCount: 1
  image:
    repository: ""
    pullPolicy: IfNotPresent
    tag: "latest"
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      add:
        - NET_BIND_SERVICE
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  healthCheck:
    path: /
  # Frontend is the catch-all (/). Longest-prefix ranking means the /api/*
  # routes above always win over this for API paths.
  httproute:
    enabled: true
    pathPrefixes:
      - /
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  extraEnv: {}
