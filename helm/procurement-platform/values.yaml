global:
  environment: base
  domain: ""
  awsRegion: us-east-1
  s3Bucket: ""
  kmsKeyId: ""
  # acmCertArn / wafAclArn are injected by CI/CD from Terraform's outputs at deploy time — never hand-typed.
  acmCertArn: ""
  wafAclArn: ""
  # Kgateway (Gateway API / Envoy) routing. One shared Gateway per environment
  # provisions a single Envoy proxy + NLB; each service attaches via its own
  # HTTPRoute. This replaces the previous per-service ALB Ingress objects.
  gateway:
    enabled: true
    className: kgateway
    nlb:
      scheme: internet-facing
      targetType: ip

# Per-service defaults. Previously each charts/<service>/values.yaml carried these
# independently; consolidated here so every subchart's values come from this single
# umbrella file (plus values-dev.yaml/values-prod.yaml image+IRSA overrides on top).

identity-service:
  replicaCount: 1
  image:
    repository: ""
    pullPolicy: IfNotPresent
    tag: "latest"
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
  service:
    type: ClusterIP
    port: 5001
    targetPort: 5001
  healthCheck:
    path: /api/health
  # HTTPRoute attaches to the shared Kgateway Gateway. Gateway API ranks rules
  # by longest-prefix match automatically, so no group.order is needed.
  httproute:
    enabled: true
    pathPrefixes:
      - /api/auth
      - /api/users
      - /api/hr
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  extraEnv: {}

