global:
  environment: prod
  domain: procurement.rxpulse.online
  awsRegion: us-east-1
  s3Bucket: procurement-documents-prod-08
  kmsKeyId: ""
  # TLS terminates at the NLB with this ACM cert (see global.gateway). Fill in
  # the prod cert ARN for procurement.rxpulse.online — until then the Gateway
  # serves HTTP only. Mirrors how values-dev.yaml carries the dev cert ARN.
  acmCertArn: ""
  wafAclArn: ""
# Prod uses human-readable release versions (git tags, e.g. v1.2.0), NOT commit
# SHAs — image.repository/tag are bumped by the app repo's deploy.yml when a
# release tag is pushed to main. v1.0.0 is the initial placeholder.
identity-service:
  replicaCount: 2
  image:
    repository: "919010206859.dkr.ecr.us-east-1.amazonaws.com/procurement-identity"
    tag: "v0.0.1"
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::919010206859:role/prod-identity-service-irsa
  autoscaling:
    maxReplicas: 10
