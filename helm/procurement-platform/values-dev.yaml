global:
  environment: dev
  domain: procurement-dev.procure-flow.online
  awsRegion: us-east-1
  s3Bucket: procurement-documents-dev-08
  kmsKeyId: ""
  # Same wildcard cert as prod (*.procure-flow.online covers any single-level
  # subdomain). Previous value (d238b114-...) no longer exists in ACM —
  # dangling reference from before the rxpulse.online -> procure-flow.online
  # domain fix, would have broken dev HTTPS the moment dev was ever deployed.
  acmCertArn: "arn:aws:acm:us-east-1:919010206859:certificate/7b27e59d-f495-4690-a7b5-4de8d21857c9"
  wafAclArn: ""
# Per-service image and serviceAccount overrides.
# image.repository and image.tag are updated at deploy time by the CD pipeline.
# serviceAccount.annotations are injected with the IRSA role ARN by the CD pipeline.
identity-service:
  image:
    repository: "919010206859.dkr.ecr.us-east-1.amazonaws.com/procurement-identity"
    tag: "ec04d3a"
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::919010206859:role/prod-identity-service-irsa
