# Reference manifest — NOT applied by ArgoCD (Helm renders the live HTTPRoute).
# Attaches ai-service to the shared Gateway (procurement-prod) for the prod environment.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-service
  namespace: production
  labels:
    app: ai-service
spec:
  parentRefs:
    - name: procurement-prod
      namespace: production
  hostnames:
    - "<DOMAIN_NAME>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      backendRefs:
        - name: ai-service
          port: 5006
