# Reference manifest — NOT applied by ArgoCD (Helm renders the live HTTPRoute).
# Attaches identity-service to the shared Gateway (procurement-prod) for the prod environment.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: identity-service
  namespace: production
  labels:
    app: identity-service
spec:
  parentRefs:
    - name: procurement-prod
      namespace: production
  hostnames:
    - "<DOMAIN_NAME>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
        - path:
            type: PathPrefix
            value: /api/users
        - path:
            type: PathPrefix
            value: /api/hr
      backendRefs:
        - name: identity-service
          port: 5001
