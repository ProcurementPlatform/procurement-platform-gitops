# Reference manifest — NOT applied by ArgoCD (Helm renders the live HTTPRoute).
# Attaches document-service to the shared Gateway (procurement-prod) for the prod environment.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: document-service
  namespace: production
  labels:
    app: document-service
spec:
  parentRefs:
    - name: procurement-prod
      namespace: production
  hostnames:
    - "<DOMAIN_NAME>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/documents
        - path:
            type: PathPrefix
            value: /api/notifications
        - path:
            type: PathPrefix
            value: /api/audit
      backendRefs:
        - name: document-service
          port: 5004
