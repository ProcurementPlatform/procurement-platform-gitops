# Reference manifest — NOT applied by ArgoCD (Helm renders the live HTTPRoute).
# Attaches procurement-service to the shared Gateway (procurement-prod) for the prod environment.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: procurement-service
  namespace: production
  labels:
    app: procurement-service
spec:
  parentRefs:
    - name: procurement-prod
      namespace: production
  hostnames:
    - "<DOMAIN_NAME>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/vendors
        - path:
            type: PathPrefix
            value: /api/purchase-requests
        - path:
            type: PathPrefix
            value: /api/purchase-orders
        - path:
            type: PathPrefix
            value: /api/contracts
      backendRefs:
        - name: procurement-service
          port: 5003
