# Reference manifest — NOT applied by ArgoCD (Helm renders the live HTTPRoute).
# Attaches frontend to the shared Gateway (procurement-prod) for the prod environment.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: production
  labels:
    app: frontend
spec:
  parentRefs:
    - name: procurement-prod
      namespace: production
  hostnames:
    - "<DOMAIN_NAME>"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
