apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: dev
  labels:
    app: finance-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      serviceAccountName: finance-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: finance-service
          image: "<AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/procurement-finance:<IMAGE_TAG>"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: finance-service
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
