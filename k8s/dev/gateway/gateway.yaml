# Reference manifest — NOT applied by ArgoCD (Helm renders the live Gateway).
# Single shared Kgateway (Gateway API) Gateway for the dev environment. Replaces
# the old per-service ALB Ingress. Kgateway provisions one Envoy proxy + one NLB;
# TLS terminates at the NLB using the ACM cert in the annotations below.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: procurement-dev
  namespace: dev
  labels:
    app.kubernetes.io/part-of: procurement-platform
    environment: dev
spec:
  gatewayClassName: kgateway
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "<ACM_CERTIFICATE_ARN>"
      service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
      service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "<DOMAIN_NAME>"
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTP
      port: 443
      hostname: "<DOMAIN_NAME>"
      allowedRoutes:
        namespaces:
          from: Same
