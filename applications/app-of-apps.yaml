apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: procurement-platform-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ProcurementPlatform/procurement-platform-gitops.git
    targetRevision: develop
    path: applications/environments
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
