apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: procurement-platform-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ProcurementPlatform/procurement-platform-gitops.git
    targetRevision: develop
    path: helm/procurement-platform
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: procurement-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # See prod/platform.yaml — HPAs manage spec.replicas live, this stops
  # ArgoCD from fighting them and flapping OutOfSync/Synced forever.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
