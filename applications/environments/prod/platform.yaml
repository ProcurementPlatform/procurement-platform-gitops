apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: procurement-platform-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ProcurementPlatform/procurement-platform-gitops.git
    targetRevision: HEAD
    path: helm/procurement-platform
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: procurement-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # Every service has an HPA managing spec.replicas live. Without this,
  # selfHeal fights the HPA every reconcile: HPA scales -> ArgoCD sees drift
  # from git's replica count -> reverts it -> HPA scales again -> flapping
  # OutOfSync/Synced forever. This tells ArgoCD to stop comparing replicas.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
