apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: procurement-platform-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ProcurementPlatform/procurement-platform-gitops.git
    targetRevision: HEAD
    path: helm/procurement-platform
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: procurement-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
